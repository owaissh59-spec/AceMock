name: Build iOS App
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm install
      - name: Build Web App
        run: npm run build
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Build iOS App
        working-directory: ./ios/App
        run: |
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Create IPA
        working-directory: ./ios/App
        run: |
          mkdir -p Payload
          cp -r ./DerivedData/Build/Products/Release-iphoneos/App.app Payload/
          zip -r AceMock.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AceMock-iOS-IPA
          path: ios/App/AceMock.ipa
